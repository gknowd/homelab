volumes:
  influxdb-data:
  influxdb-config:

services:
  influxdb:
    container_name: influxdb
    image: influxdb:latest
    restart: unless-stopped
    ports:
      - '8086:8086'
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2

    # (Optional) Automatic Setup - uncomment and configure for automated initialization
    # environment:
    #   - DOCKER_INFLUXDB_INIT_MODE=setup
    #   - DOCKER_INFLUXDB_INIT_USERNAME=admin
    #   - DOCKER_INFLUXDB_INIT_PASSWORD=my-secure-password
    #   - DOCKER_INFLUXDB_INIT_ORG=my-org
    #   - DOCKER_INFLUXDB_INIT_BUCKET=my-bucket
    #   # (Optional) Configure Data Retention (e.g., 1w, 30d, 0 for infinite)
    #   - DOCKER_INFLUXDB_INIT_RETENTION=0
    #   # (Optional) Admin Token - generate a secure token
    #   - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-auth-token
