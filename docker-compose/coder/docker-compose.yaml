version: '3.8'

services:
  coder:
    image: ghcr.io/coder/coder:latest
    container_name: coder
    restart: unless-stopped
    environment:
      CODER_PG_CONNECTION_URL: postgresql://${CODER_DB_USER:-coder}:${CODER_DB_PASSWORD}@postgres.cloudtorq.io:5432/${CODER_DB_NAME:-coder}?sslmode=disable
      CODER_ACCESS_URL: https://coder.cloudtorq.io
      CODER_WILDCARD_ACCESS_URL: "*.coder.cloudtorq.io"
      CODER_HTTP_ADDRESS: "0.0.0.0:7080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.coder.rule=Host(`coder.cloudtorq.io`) || HostRegexp(`{subdomain:[a-z0-9-]+}.coder.cloudtorq.io`)"
      - "traefik.http.routers.coder.entrypoints=websecure"
      - "traefik.http.routers.coder.tls=true"
      - "traefik.http.routers.coder.tls.certresolver=letsencrypt"
      - "traefik.http.services.coder.loadbalancer.server.port=7080"

networks:
  traefik:
    external: true
